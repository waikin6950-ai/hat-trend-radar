<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAT TREND RADAR · Top One Hat Factory</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Serif+SC:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', "PingFang SC", sans-serif; background: #0a0a0a; color: #fafafa; }
  .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }
  .serif { font-family: 'Noto Serif SC', serif; }
  .accent-c { color: #FF4B1F; }
  .accent-bg { background: #FF4B1F; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

<div class="max-w-2xl w-full text-center">
  <div class="mb-8">
    <div class="w-16 h-16 accent-bg rounded-sm flex items-center justify-center mx-auto mb-6">
      <span class="display text-4xl text-black">T</span>
    </div>
    <div class="display text-2xl tracking-wider mb-2">TOP ONE HAT FACTORY</div>
    <div class="text-xs tracking-widest text-stone-500 uppercase">HAT TREND RADAR</div>
  </div>

  <h1 class="display text-6xl md:text-8xl font-bold leading-none mb-4">
    HAT TREND<br><span class="accent-c">RADAR</span>
  </h1>

  <p class="serif text-stone-400 mb-12 text-lg">每周一份给设计部的市场情报</p>

  <div class="bg-stone-900 border border-stone-800 rounded-sm p-6 mb-6">
    <div class="text-xs tracking-widest text-stone-500 uppercase mb-2">正在跳转到最新一期</div>
    <div id="redirect-info" class="display text-2xl mb-3">ISSUE No.001 · WK24 / 2026</div>
    <a id="latest-link" href="2026-W24/index.html" class="inline-block accent-bg text-black display text-xl px-6 py-3 hover:bg-orange-500 transition">
      → 直接打开最新一期
    </a>
  </div>

  <a href="archive.html" class="text-stone-400 hover:text-white text-sm tracking-widest uppercase">
    📚 查看历史所有期数
  </a>

  <div class="mt-16 text-xs tracking-widest text-stone-600 uppercase">
    © 2026 TOP ONE HAT FACTORY · DESIGNED BY <span class="accent-c">KIN</span>
  </div>
</div>

<script>
  // 跳到最新期
  fetch('issues.json').then(r => r.json()).then(data => {
    const latest = data.issues[0];
    if (latest) {
      document.getElementById('latest-link').href = latest.url;
      document.getElementById('redirect-info').textContent = `ISSUE No.${latest.number} · WK${latest.week} / ${latest.year}`;
      // 1.5 秒后自动跳转
      setTimeout(() => { window.location.href = latest.url; }, 1500);
    }
  });
</script>

</body>
</html>
